<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruttis</title>
    <style>
        body {
            margin: 0;
            padding: 5px;
            background: linear-gradient(135deg, #e0f7fa, #81d4fa);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        h1 {
            color: #006064;
            margin: 5px 0;
            font-size: 1.6rem;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.7);
            text-align: center;
        }

        #top-ui {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        .ui-box {
            font-size: 0.9rem;
            color: #004d40;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.85);
            padding: 5px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #fff;
            text-align: center;
            min-width: 90px;
        }

        .ui-box span {
            display: block;
            font-size: 1.1rem;
            margin-top: 2px;
            color: #00796b;
        }

        #next-fruit-emoji {
            font-size: 1.4rem;
        }

        #game-container {
            position: relative;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 4px solid #ffffff;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 400 / 600;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: #e0f2f1;
            cursor: crosshair;
            width: 100%;
            height: 100%;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            color: white;
            z-index: 10;
        }

        #game-over h2 {
            color: #ff5252;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #game-over p {
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #ff4081, #c51162);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(197, 17, 98, 0.5);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🍉 Fruttis 🍓</h1>
    
    <div id="top-ui">
        <div class="ui-box">
            Poäng / Bästa
            <span id="score-display">0 / 0</span>
        </div>
        <div class="ui-box">
            Nästa
            <span id="next-fruit-emoji">❓</span>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="game-over">
            <h2>Det blev fullt!</h2>
            <p>Frukterna nådde toppen.</p>
            <button class="btn" onclick="resetGame()">Försök igen</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplayEl = document.getElementById('score-display');
        const nextFruitEmojiEl = document.getElementById('next-fruit-emoji');
        const gameOverEl = document.getElementById('game-over');

        let score = 0;
        let highScore = localStorage.getItem('fruttisHighScore') || 0;
        let gameOver = false;
        let dropCooldown = false;

        const DROP_LINE_Y = 90;

        const FRUITS = [
            { radius: 14, emoji: '🍒', points: 2, bg: '#ffcccc' },
            { radius: 20, emoji: '🍓', points: 4, bg: '#ff9999' },
            { radius: 27, emoji: '🍇', points: 8, bg: '#d1b3ff' },
            { radius: 34, emoji: '🍊', points: 16, bg: '#ffbb99' },
            { radius: 42, emoji: '🍌', points: 24, bg: '#ffff99' },
            { radius: 50, emoji: '🍎', points: 32, bg: '#99ffbb' },
            { radius: 60, emoji: '🍑', points: 48, bg: '#ffcc99' },
            { radius: 72, emoji: '🍍', points: 64, bg: '#ffe680' },
            { radius: 86, emoji: '🍉', points: 128, bg: '#99ffcc' }
        ];

        let fruits = [];
        let particles = [];
        let currentFruitIndex = 0;
        let nextFruitIndex = 0;
        let dropX = canvas.width / 2;

        function updateScoreDisplay() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('fruttisHighScore', highScore);
            }
            scoreDisplayEl.innerText = `${Math.floor(score)} / ${Math.floor(highScore)}`;
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 4 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class Fruit {
            constructor(x, y, level) {
                this.x = x;
                this.y = y;
                this.level = level;
                this.radius = FRUITS[level].radius;
                this.vx = 0;
                this.vy = 0;
                this.isDropped = false;
                this.markedForDeletion = false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetY = 3;

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = FRUITS[this.level].bg;
                ctx.fill();
                
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();
                
                ctx.shadowColor = 'transparent';

                ctx.font = `${this.radius * 1.1}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#000';
                ctx.fillText(FRUITS[this.level].emoji, 0, 0);
                
                ctx.restore();
            }

            update() {
                if (!this.isDropped) return;

                this.vy += 0.35; 
                this.y += this.vy;
                this.x += this.vx;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -0.2;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -0.2;
                }

                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -0.1; 
                    this.vx *= 0.6;  
                }
            }
        }

        function initFruits() {
            currentFruitIndex = Math.floor(Math.random() * 5);
            nextFruitIndex = Math.floor(Math.random() * 5);
            nextFruitEmojiEl.innerText = FRUITS[nextFruitIndex].emoji;
        }

        function spawnNewFruit() {
            currentFruitIndex = nextFruitIndex;
            nextFruitIndex = Math.floor(Math.random() * 5); 
            nextFruitEmojiEl.innerText = FRUITS[nextFruitIndex].emoji;
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function handleInputMove(clientX) {
            if (gameOver || dropCooldown) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            dropX = (clientX - rect.left) * scaleX;
            
            const radius = FRUITS[currentFruitIndex].radius;
            if (dropX < radius) dropX = radius;
            if (dropX > canvas.width - radius) dropX = canvas.width - radius;
        }

        canvas.addEventListener('mousemove', (e) => handleInputMove(e.clientX));
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            handleInputMove(e.touches[0].clientX);
        }, {passive: false});
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInputMove(e.touches[0].clientX);
        }, {passive: false});

        function dropFruit() {
            if (gameOver || dropCooldown) return;

            const newFruit = new Fruit(dropX, DROP_LINE_Y, currentFruitIndex);
            newFruit.isDropped = true;
            fruits.push(newFruit);

            dropCooldown = true;
            setTimeout(() => {
                dropCooldown = false;
                spawnNewFruit();
            }, 350);
        }

        canvas.addEventListener('click', (e) => {
            handleInputMove(e.clientX);
            dropFruit();
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            dropFruit();
        });

        function checkCollisions() {
            for (let i = 0; i < fruits.length; i++) {
                for (let j = i + 1; j < fruits.length; j++) {
                    let f1 = fruits[i];
                    let f2 = fruits[j];

                    if (f1.markedForDeletion || f2.markedForDeletion) continue;

                    let dx = f2.x - f1.x;
                    let dy = f2.y - f1.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let minDist = f1.radius + f2.radius;

                    if (dist < minDist) {
                        let overlap = minDist - dist;
                        let angle = Math.atan2(dy, dx);
                        let ax = Math.cos(angle) * overlap * 0.5;
                        let ay = Math.sin(angle) * overlap * 0.5;

                        f1.x -= ax;
                        f1.y -= ay;
                        f2.x += ax;
                        f2.y += ay;
                        
                        f1.vx *= 0.6;
                        f1.vy *= 0.6;
                        f2.vx *= 0.6;
                        f2.vy *= 0.6;
                    }
                }
            }

            let pairs = [];
            for (let i = 0; i < fruits.length; i++) {
                for (let j = i + 1; j < fruits.length; j++) {
                    let f1 = fruits[i];
                    let f2 = fruits[j];
                    if (f1.markedForDeletion || f2.markedForDeletion) continue;

                    if (f1.level === f2.level) {
                        let dx = f2.x - f1.x;
                        let dy = f2.y - f1.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist <= f1.radius + f2.radius + 2) {
                            pairs.push([f1, f2]);
                        }
                    }
                }
            }

            let visited = new Set();
            for (let fruit of fruits) {
                if (fruit.markedForDeletion || visited.has(fruit)) continue;

                let cluster = [];
                let queue = [fruit];
                visited.add(fruit);

                while (queue.length > 0) {
                    let curr = queue.shift();
                    cluster.push(curr);

                    for (let pair of pairs) {
                        let neighbor = null;
                        if (pair[0] === curr && !visited.has(pair[1]) && pair[1].level === curr.level) {
                            neighbor = pair[1];
                        } else if (pair[1] === curr && !visited.has(pair[0]) && pair[0].level === curr.level) {
                            neighbor = pair[0];
                        }

                        if (neighbor) {
                            visited.add(neighbor);
                            queue.push(neighbor);
                        }
                    }
                }

                if (cluster.length >= 3) {
                    let f1 = cluster[0];
                    let f2 = cluster[1];
                    let f3 = cluster[2];

                    f1.markedForDeletion = true;
                    f2.markedForDeletion = true;
                    f3.markedForDeletion = true;

                    let newX = (f1.x + f2.x + f3.x) / 3;
                    let newY = (f1.y + f2.y + f3.y) / 3;
                    let lvlNum = f1.level;
                    
                    spawnParticles(newX, newY, FRUITS[lvlNum].bg);

                    if (lvlNum >= FRUITS.length - 1) {
                        score += 500; 
                    } else {
                        let nextLevel = lvlNum + 1;
                        score += FRUITS[nextLevel].points * 1.5;

                        let mergedFruit = new Fruit(newX, newY, nextLevel);
                        mergedFruit.isDropped = true;
                        mergedFruit.vy = -5; 
                        fruits.push(mergedFruit);
                    }
                    
                    updateScoreDisplay();
                    break;
                }
            }

            fruits = fruits.filter(f => !f.markedForDeletion);
        }

        function checkGameOver() {
            for (let f of fruits) {
                if (f.isDropped && f.vy <= 0.1 && f.y - f.radius < DROP_LINE_Y + 5) {
                    gameOver = true;
                    gameOverEl.style.display = 'flex';
                }
            }
        }

        function resetGame() {
            fruits = [];
            particles = [];
            score = 0;
            updateScoreDisplay();
            gameOver = false;
            gameOverEl.style.display = 'none';
            initFruits();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#ff7043';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.moveTo(0, DROP_LINE_Y);
            ctx.lineTo(canvas.width, DROP_LINE_Y);
            ctx.stroke();
            ctx.setLineDash([]);

            for (let fruit of fruits) {
                fruit.update();
                fruit.draw();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            checkCollisions();

            if (!gameOver) {
                let radius = FRUITS[currentFruitIndex].radius;
                ctx.save();
                ctx.beginPath();
                ctx.arc(dropX, DROP_LINE_Y, radius, 0, Math.PI * 2);
                ctx.fillStyle = FRUITS[currentFruitIndex].bg;
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.font = `${radius * 1.1}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#000';
                ctx.fillText(FRUITS[currentFruitIndex].emoji, dropX, DROP_LINE_Y);
                ctx.restore();

                checkGameOver();
            }

            requestAnimationFrame(gameLoop);
        }

        initFruits();
        updateScoreDisplay();
        gameLoop();
    </script>
</body>
</html>
